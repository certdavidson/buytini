<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Технічні роботи — buytini</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geologica:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/main.css">
<script>(function(){try{var t=localStorage.getItem('buytini-theme');if(!t){t=(window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches)?'dark':'light';}document.documentElement.setAttribute('data-theme',t);}catch(e){document.documentElement.setAttribute('data-theme','light');}})();</script>
</head>
<body>

  <main class="state state--full">
    <div class="state__inner">
      <span class="state__icon state__icon--accent"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg></span>
      
      <h1 class="state__title">Ведемо технічні роботи</h1>
      <p class="state__text">buytini тимчасово недоступний — оновлюємо сервіс. Повернемось за кілька хвилин.</p>
      <div class="state__actions"><a class="btn btn--primary state__btn" href="#">Оновити сторінку</a></div>
    </div>
  </main>

  <script src="js/main.js" defer></script>
</body>
</html>
