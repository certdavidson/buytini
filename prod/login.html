<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Вхід — buytini</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geologica:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/main.css">
<script>(function(){try{var t=localStorage.getItem('buytini-theme');if(!t){t=(window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches)?'dark':'light';}document.documentElement.setAttribute('data-theme',t);}catch(e){document.documentElement.setAttribute('data-theme','light');}})();</script>
</head>
<body>

  <div class="auth-page">
    <div class="auth-brand">
      <a class="auth-brand__logo" href="index.html"><img src="images/buytini-logo.svg" alt="buytini" width="40" height="42"><span>buytini</span></a>
      <div class="auth-brand__body"><h2 class="auth-brand__title">Ваш особистий шопер за кордоном</h2><p class="auth-brand__text">Викуп і доставка брендових речей зі США та Європи. Каталог або будь-який товар за посиланням.</p></div>
      <div class="auth-brand__stats"><span class="auth-brand__stat"><b>25k+</b><span>замовлень</span></span><span class="auth-brand__stat"><b>120+</b><span>брендів</span></span><span class="auth-brand__stat"><b>4.8★</b><span>рейтинг</span></span></div>
      <span class="auth-brand__bg" style="background-image:url(https://images.unsplash.com/photo-1483985988355-763728e1935b?auto=format&fit=crop&w=900&q=70)"></span>
    </div>
    <div class="auth-form"><div class="auth-form__inner">
      <span class="auth-form__eyebrow">З поверненням</span>
      <h1 class="auth-form__title">Вхід в акаунт</h1>
      <p class="auth-form__sub">Немає акаунта? <a href="register.html">Зареєструватися</a></p>
      <form data-form="login" data-go="account.html">
        <label class="field__label">Email або телефон</label>
        <input class="input auth-input" required placeholder="you@example.com">
        <div class="auth-row"><label class="field__label auth-row__label">Пароль</label><a class="auth-row__link" href="forgot.html">Забули пароль?</a></div>
        <input class="input auth-input" type="password" required placeholder="••••••••">
        <button class="btn btn--primary btn--block auth-submit" type="submit">Увійти</button>
      </form>
      <div class="auth-form__divider"><span></span><span>або</span><span></span></div>
      <a class="btn btn--ghost btn--block auth-alt" href="login-sms.html"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.8"><rect x="6" y="3" width="12" height="18" rx="2"/><path d="M11 18h2"/></svg>Увійти за SMS-кодом</a>
    </div></div>
  </div>

  <script src="js/main.js" defer></script>
</body>
</html>
