<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Відновлення пароля — buytini</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geologica:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/main.css">
<script>(function(){try{var t=localStorage.getItem('buytini-theme');if(!t){t=(window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches)?'dark':'light';}document.documentElement.setAttribute('data-theme',t);}catch(e){document.documentElement.setAttribute('data-theme','light');}})();</script>
</head>
<body>

  <div class="auth-center"><div class="auth-center__inner">
    <a class="auth-center__logo" href="index.html"><img src="images/buytini-logo.svg" alt="buytini" width="40" height="42"><span>buytini</span></a>
    <div class="auth-card">
      <div id="forgot-form">
        <h1 class="auth-card__title">Відновлення пароля</h1>
        <p class="auth-card__sub">Вкажіть email — надішлемо посилання для скидання пароля.</p>
        <form data-form="forgot" data-show="#forgot-sent" data-hide="#forgot-form">
          <label class="field__label">Email</label>
          <input class="input auth-input" type="email" required placeholder="you@example.com">
          <button class="btn btn--primary btn--block auth-submit" type="submit">Надіслати посилання</button>
        </form>
      </div>
      <div id="forgot-sent" hidden class="auth-sent">
        <span class="auth-card__success-icon"><svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7l9 6 9-6M3 7v10h18V7M3 7l9 6 9-6z"/></svg></span>
        <h1 class="auth-card__title">Перевірте пошту</h1>
        <p class="auth-card__sub">Ми надіслали посилання для скидання пароля. Не отримали? Перевірте «Спам» або спробуйте ще раз.</p>
        <button class="btn btn--ghost btn--block auth-alt2" type="button" data-form-toast>Надіслати ще раз</button>
      </div>
    </div>
    <p class="auth-center__below"><a href="login.html">← Повернутися до входу</a></p>
  </div></div>

  <script src="js/main.js" defer></script>
</body>
</html>
